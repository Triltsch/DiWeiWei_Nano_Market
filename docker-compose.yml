services:
  # PostgreSQL - Primary Database
  postgres:
    image: postgres:13-alpine
    container_name: diwei_dev_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diwei_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diwei_password}
      POSTGRES_DB: ${POSTGRES_DB:-diwei_nano_market}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diwei_user} -d ${POSTGRES_DB:-diwei_nano_market}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - diwei_dev
    restart: unless-stopped

  # Redis - Caching Layer
  redis:
    image: redis:7-alpine
    container_name: diwei_dev_redis
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - diwei_dev
    restart: unless-stopped
    command: redis-server --appendonly yes

  # MinIO - S3-compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: diwei_dev_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data_latest:/minio_data
    networks:
      - diwei_dev
    restart: unless-stopped
    command: minio server /minio_data --console-address ":9001"

  # Meilisearch - Full-text Search Engine
  meilisearch:
    image: getmeili/meilisearch:v1.6.0
    container_name: diwei_dev_meilisearch
    environment:
      MEILI_NO_ANALYTICS: "true"
      # Master key for local development (required for production)
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-diweiwei-dev-master-key-32-bytes-secure}
    ports:
      - "127.0.0.1:7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - meilisearch_data_v1_6_0:/meili_data
    networks:
      - diwei_dev
    restart: unless-stopped

  # MinIO Bucket Initialization
  minio_init:
    image: minio/mc:latest
    container_name: diwei_dev_minio_init
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-nanos}
    entrypoint: >
      /bin/sh -c "
      set -e;
      /usr/bin/mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      /usr/bin/mc mb myminio/$$MINIO_BUCKET_NAME --ignore-existing;
      "
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - diwei_dev

  # FastAPI Backend Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diwei_dev_app
    env_file: .env
    environment:
      # Override for Docker Compose
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/app/main.py && echo 'ready'"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    volumes:
      - ./app:/app/app:cached
      - ./pyproject.toml:/app/pyproject.toml:ro
    networks:
      - diwei_dev
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data_latest:
  meilisearch_data_v1_6_0:

networks:
  diwei_dev:
    driver: bridge
