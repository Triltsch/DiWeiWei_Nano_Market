services:
  # PostgreSQL - Primary Database
  postgres:
    image: postgres:13-alpine
    container_name: diwei_dev_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diwei_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diwei_password}
      POSTGRES_DB: ${POSTGRES_DB:-diwei_nano_market}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diwei_user} -d ${POSTGRES_DB:-diwei_nano_market}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - diwei_dev
    restart: unless-stopped

  # Redis - Caching Layer
  redis:
    image: redis:7-alpine
    container_name: diwei_dev_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - diwei_dev
    restart: unless-stopped
    command: redis-server --appendonly yes

  # MinIO - S3-compatible Object Storage
  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-RELEASE.2025-09-07T16-13-09Z}
    container_name: diwei_dev_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/minio_data
    networks:
      - diwei_dev
    restart: unless-stopped
    command: minio server /minio_data --console-address ":9001"

  # Meilisearch - Full-text Search Engine
  meilisearch:
    image: getmeili/meilisearch:v1.6.0
    container_name: diwei_dev_meilisearch
    environment:
      MEILI_NO_ANALYTICS: "true"
      # Master key for local development (required for production)
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-diweiwei-dev-master-key-32-bytes-secure}
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - diwei_dev
    restart: unless-stopped

  # MinIO Bucket Initialization
  minio_init:
    image: minio/mc:${MINIO_MC_IMAGE_TAG:-RELEASE.2025-08-13T08-35-41Z}
    container_name: diwei_dev_minio_init
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-nanos}
    entrypoint: >
      /bin/sh -c "
      set -e;
      /usr/bin/mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      /usr/bin/mc mb myminio/$$MINIO_BUCKET_NAME --ignore-existing;
      "
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - diwei_dev

  # FastAPI Backend Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diwei_dev_app
    env_file: .env
    environment:
      # Override for Docker Compose (use service names, not localhost)
      DATABASE_URL: "postgresql://${POSTGRES_USER:-diwei_user}:${POSTGRES_PASSWORD:-diwei_password}@postgres:5432/${POSTGRES_DB:-diwei_nano_market}"
      REDIS_URL: "redis://redis:6379/0"
      MEILI_URL: "http://meilisearch:7700"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-diweiwei-dev-master-key-32-bytes-secure}"
      FRONTEND_URL: "http://localhost:3000"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      # Pass PostgreSQL credentials for entrypoint script
      POSTGRES_USER: "${POSTGRES_USER:-diwei_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-diwei_password}"
      POSTGRES_DB: "${POSTGRES_DB:-diwei_nano_market}"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    volumes:
      - ./app:/app/app:cached
      - ./pyproject.toml:/app/pyproject.toml:ro
    networks:
      - diwei_dev
    restart: unless-stopped

  # Frontend - React + Vite dev server with bind-mount live reload
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    container_name: diwei_dev_frontend
    environment:
      VITE_DEV_SERVER_HOST: "0.0.0.0"
      # Keep empty so existing frontend endpoints like /api/v1/* are not prefixed twice.
      VITE_API_BASE_URL: ""
      # Internal Docker network target for Vite proxy.
      VITE_API_PROXY_TARGET: "http://app:8000"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    ports:
      - "3000:5173"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./frontend:/frontend:cached
      - frontend_node_modules:/frontend/node_modules
    networks:
      - diwei_dev
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
  frontend_node_modules:

networks:
  diwei_dev:
    driver: bridge
