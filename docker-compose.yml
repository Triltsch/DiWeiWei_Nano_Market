version: "3.9"

services:
  # PostgreSQL - Primary Database
  postgres:
    image: postgres:13-alpine
    container_name: diwei_dev_postgres
    environment:
      POSTGRES_USER: diwei_user
      POSTGRES_PASSWORD: diwei_password
      POSTGRES_DB: diwei_nano_market
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diwei_user -d diwei_nano_market"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - diwei_dev
    restart: unless-stopped

  # Redis - Caching Layer
  redis:
    image: redis:7-alpine
    container_name: diwei_dev_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - diwei_dev
    restart: unless-stopped
    command: redis-server --appendonly yes

  # MinIO - S3-compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: diwei_dev_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/minio_data
    networks:
      - diwei_dev
    restart: unless-stopped
    command: minio server /minio_data --console-address ":9001"

  # Meilisearch - Full-text Search Engine
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: diwei_dev_meilisearch
    environment:
      MEILI_NO_ANALYTICS: "true"
      # Set a master key for production security (optional for local dev)
      # MEILI_MASTER_KEY: "your-secure-key-here"
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - diwei_dev
    restart: unless-stopped

  # FastAPI Backend Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diwei_dev_app
    environment:
      APP_NAME: "DiWeiWei Nano-Marktplatz"
      APP_VERSION: "0.1.0"
      DEBUG: "False"
      ENV: "development"
      # Database Configuration for Docker Compose
      DATABASE_URL: "postgresql+asyncpg://diwei_user:diwei_password@postgres:5432/diwei_nano_market"
      # Redis Configuration
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      # JWT & Security
      SECRET_KEY: "dev-unsafe-change-me"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      # Email Verification
      EMAIL_VERIFICATION_TOKEN_EXPIRE_HOURS: "24"
      # Account Security
      MAX_LOGIN_ATTEMPTS: "3"
      ACCOUNT_LOCKOUT_DURATION_MINUTES: "60"
      # Password Policy
      MIN_PASSWORD_LENGTH: "8"
      REQUIRE_SPECIAL_CHAR: "true"
      REQUIRE_DIGIT: "true"
      REQUIRE_UPPERCASE: "true"
      # Session Settings
      SESSION_TIMEOUT_MINUTES: "30"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    volumes:
      - ./app:/app/app:cached
      - ./pyproject.toml:/app/pyproject.toml:ro
    networks:
      - diwei_dev
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:

networks:
  diwei_dev:
    driver: bridge
