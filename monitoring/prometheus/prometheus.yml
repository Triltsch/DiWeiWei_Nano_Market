global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  - job_name: postgres_exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: redis_exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["redis_exporter:9121"]
