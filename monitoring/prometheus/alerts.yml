groups:
  - name: api-alerts
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="fastapi",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="fastapi"}[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High API error rate"
          description: "FastAPI 5xx error rate is above 5% for at least 2 minutes."

      - alert: SlowAPI
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{job="fastapi"}[5m]))
          ) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Slow API responses"
          description: "FastAPI p95 request latency is above 1 second for at least 2 minutes."

  - name: feedback-alerts
    rules:
      - alert: FeedbackHighServerErrorRate
        expr: |
          (
            sum(rate(feedback_requests_total{outcome="server_error"}[10m]))
            /
            clamp_min(sum(rate(feedback_requests_total[10m])), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: critical
          scope: feedback
        annotations:
          summary: "High feedback endpoint server error rate"
          description: "Feedback endpoints are returning more than 5% server errors for at least 10 minutes."

      - alert: FeedbackSlowAPI
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(feedback_request_duration_seconds_bucket[10m]))
          ) > 0.75
        for: 10m
        labels:
          severity: warning
          scope: feedback
        annotations:
          summary: "Slow feedback endpoint responses"
          description: "Feedback endpoint p95 latency is above 750ms for at least 10 minutes."
