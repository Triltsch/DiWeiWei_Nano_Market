name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run unit tests (SQLite)
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          python -m pytest tests/ -m "not integration" -v --cov=app --cov-report=xml
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unit-tests
          name: codecov-umbrella

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: diweiwei_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      mailpit:
        image: axllent/mailpit:v1.26.2
        options: >-
          --health-cmd "wget --quiet --tries=1 --spider http://localhost:8025/api/v1/info"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 1025:1025
          - 8025:8025
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run integration tests (PostgreSQL)
        env:
          TEST_DB_URL: postgresql+asyncpg://testuser:testpassword@localhost:5433/diweiwei_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_USE_TLS: "false"
          SMTP_USE_STARTTLS: "false"
          AUTH_RESEND_RETURN_TOKEN: "false"
          MAILPIT_API_BASE_URL: http://localhost:8025/api/v1
        run: |
          python -m pytest tests/ -m integration -v --no-cov
