name: Backend Tests and Quality

on:
  workflow_call:
    outputs:
      coverage:
        description: Backend line coverage percentage
        value: ${{ jobs.backend-tests.outputs.coverage }}

permissions:
  contents: read
  pull-requests: write

jobs:
  backend-tests:
    name: Backend test, lint, and security gates
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage-metric.outputs.coverage }}

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit

      - name: Run backend tests with coverage gate
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          python -m pytest tests/ -v -m "not integration" --cov=app --cov-report=xml --cov-fail-under=80

      - name: Backend formatting checks
        run: |
          python -m black --check app tests
          python -m isort --check-only app tests

      - name: Backend static analysis
        run: |
          python -m pylint app

      - name: Backend security scan (Bandit)
        run: |
          python -m bandit -r app -x tests,migrations

      - name: Extract coverage metric
        id: coverage-metric
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          tree = ET.parse("coverage.xml")
          root = tree.getroot()
          line_rate = float(root.attrib.get("line-rate", "0"))
          coverage = f"{line_rate * 100:.2f}"

            github_output_path = os.environ["GITHUB_OUTPUT"]

            with open(github_output_path, "a", encoding="utf-8") as fh:
              fh.write(f"coverage={coverage}\n")
          PY

      - name: Comment backend coverage in PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COVERAGE: ${{ steps.coverage-metric.outputs.coverage }}
        with:
          script: |
            const marker = '<!-- backend-coverage-comment -->';
            const body = `${marker}\nBackend coverage: **${process.env.COVERAGE}%** (required: >= 80%).`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: coverage.xml
          if-no-files-found: error
