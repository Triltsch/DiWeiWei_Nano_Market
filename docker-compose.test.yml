version: "3.9"

services:
  postgres:
    image: postgres:13-alpine
    container_name: diweiwei_test_db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: diweiwei_test
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5433:5432"  # Use different port to avoid conflicts with production DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d diweiwei_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - diweiwei_test_db_data:/var/lib/postgresql/data
    networks:
      - diweiwei_test

  redis:
    image: redis:7-alpine
    container_name: diweiwei_test_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - diweiwei_test

  mailpit:
    image: axllent/mailpit:v1.26.2
    container_name: diweiwei_test_mailpit
    command: ["--database", "/data/mailpit.db", "--smtp", "0.0.0.0:1025", "--listen", "0.0.0.0:8025"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 1025 && wget --quiet --tries=1 --spider http://127.0.0.1:8025/api/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - mail_queue_data:/data
    networks:
      - mail_internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diweiwei_test_app
    env_file: .env
    environment:
      TEST_DB_URL: "postgresql+asyncpg://testuser:testpassword@postgres:5432/diweiwei_test"
      REDIS_URL: "redis://redis:6379/0"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_USE_TLS: "false"
      SMTP_USE_STARTTLS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    networks:
      - diweiwei_test
      - mail_internal

volumes:
  diweiwei_test_db_data:
  diweiwei_test_redis_data:
  mail_queue_data:

networks:
  diweiwei_test:
    driver: bridge
  mail_internal:
    driver: bridge
    internal: true
